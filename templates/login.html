<!DOCTYPE html>
<html>
<head>
    <title>BombSquda</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <meta content="BombSquda: Mell's stupid Modpack" property="og:title"/>
	<meta name="twitter:card" content="summary_large_image">
    <style>	
		@font-face {
			font-family: 'bombsquad';
			src: url('static/hobo.ttf') format('truetype');
			font-weight: light;
			font-style: normal;
		}
		.a2 {
			/* Set display to inline-block so transform works */
			display: inline-block; 
			
			/* Smooths the scaling effect */
			transition: transform 0.2s ease-in-out; 
			
			/* Optional: additional styling */
			padding: 10px 15px;
			color: #000;
			text-decoration: none;
		}
		/* unvisited link */
		.a2:link {
		  color: white;
		  background-color: transparent;
		  text-decoration: none; /* optional: removes underline */
		}

		/* visited link */
		.a2:visited {
		  color: white;
		  background-color: transparent;
		  text-decoration: none;
		}

		/* mouse over link */
		.a2:hover {
		  color: green;
		  background-color: transparent;
		  text-decoration: none; /* optional: adds underline on hover */
		  transform: scale(1.1);
		}

		/* selected link */
		.a2:active {
		  color: lime;
		  background-color: transparent;
		  text-decoration: none;
		  transform: scale(1.4);
		  transition: transform 0.1s ease-in-out; 
		}
        body {
            background:	#ada993;
            color: #ffffff;
            font-family: sans-serif;
            background-image: url('static/snescourse_blur.png');
            background-size: cover;
            text-align: center;
            padding: 40px;
			scrollbar-color: red orange;
			scrollbar-width: thin;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 20px;
            border-radius: 12px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .myButton {
            background-color: #18d641; 
            border: none;
            color: #ffffff;
            padding: 10px 40px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            font-family: sans-serif;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s ease-in-out;
			transform: scale(0.9);
        }
		.myField {
            background-color: #222034; 
            border: none;
            color: #ffffff;
            padding: 7px 70px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            font-family: sans-serif;
            border-radius: 8px;
            transition: transform 0.1s ease-in-out;
			transform: scale(0.8);
        }
        .myButton:hover {
            transform: scale(1.0);
        }
		.myButton:active {
            transform: scale(1.3);
        }
    </style>
    <body>
        <img src="static/squda_title.png" alt="Title of the modpack">
        <p></p>
		<h2><a href="/" class="a2"><- Go Back</a></h2>
        <div class="container">
			<h1>Login</h1>
            <h2>Welcome back!</h2>
            <h3>
                You can login here with your BombSquda ID or your username.
				If it's not your first time here, you'll have to put in your password.
				Otherwise, enter your new password into the password field, and it'll be registered.
            </h3>
			{% if error %}
			<p style="color:red;">{{ error }}</p>
			{% endif %}
			<form action="login" method="POST">
				<input type="text" class="myField" name="user" placeholder="ID or User"><br>
				<input type="password" class="myField" name="pass" placeholder="Password"><br>
				<button type="submit" class="myButton">Login</button>
			</form>
        </div>
    </body>
</head>
</html>
