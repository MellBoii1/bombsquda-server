<!DOCTYPE html>
<html>
<head>
    <title>BombSquda</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <meta content="BombSquda: Mell's stupid Modpack" property="og:title"/>
	<meta name="twitter:card" content="summary_large_image">
    <style>	
		@font-face {
			font-family: 'bombsquad';
			src: url('static/hobo.ttf') format('truetype');
			font-weight: light;
			font-style: normal;
		}
		.a2 {
			/* Set display to inline-block so transform works */
			display: inline-block; 
			
			/* Smooths the scaling effect */
			transition: transform 0.2s ease-in-out; 
			
			/* Optional: additional styling */
			padding: 10px 15px;
			color: #000;
			text-decoration: none;
		}
		/* unvisited link */
		.a2:link {
		  color: white;
		  background-color: transparent;
		  text-decoration: none; /* optional: removes underline */
		}

		/* visited link */
		.a2:visited {
		  color: white;
		  background-color: transparent;
		  text-decoration: none;
		}

		/* mouse over link */
		.a2:hover {
		  color: green;
		  background-color: transparent;
		  text-decoration: none; /* optional: adds underline on hover */
		  transform: scale(1.1);
		}

		/* selected link */
		.a2:active {
		  color: lime;
		  background-color: transparent;
		  text-decoration: none;
		  transform: scale(1.4);
		  transition: transform 0.1s ease-in-out; 
		}
        body {
            background:	#ada993;
            color: #ffffff;
            font-family: sans-serif;
            background-image: url('static/snescourse_blur.png');
            background-size: cover;
            text-align: center;
            padding: 40px;
			scrollbar-color: red orange;
			scrollbar-width: thin;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 20px;
            border-radius: 12px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .myButton {
            background-color: #18d641; 
            border: none;
            color: #ffffff;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            font-family: 'bombsquad', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s ease-in-out;
        }
        .myButton:hover {
            transform: scale(1.1);
        }
		.myButton:active {
            transform: scale(1.3);
        }
    </style>
    <body>
        <p></p>
		<h2><a href="/" class="a2"><- Go Back</a></h2>
        <div class="container">
			hi<br>
			your name is {{ username }}<br>
			your id is {{ id }}<br>
			ok get outta here i already saved your cookies
			im not addding account settings yet
        </div>
    </body>
</head>
</html>
